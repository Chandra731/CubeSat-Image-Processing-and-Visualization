<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubeSat Visualization</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.91/Build/Cesium/Cesium.js"></script>
</head>
<body>
    <div id="cesiumContainer"></div>

    <div id="controls">
        <label>Latitude: <input type="text" id="latitude" readonly></label>
        <label>Longitude: <input type="text" id="longitude" readonly></label>
        <button id="capture">Capture Image</button>
        <button id="imageHistory">Image History</button>
    </div>

    <script src="{{ url_for('static', filename='cesiumSetup.js') }}"></script>
    <script src="{{ url_for('static', filename='apiHandler.js') }}"></script>
    <script src="{{ url_for('static', filename='uiHandler.js') }}"></script>
</body>
</html>
